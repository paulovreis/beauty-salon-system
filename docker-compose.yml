version: '3.8'

services:
  # PostgreSQL para o sistema principal
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beauty_salon}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-evolution-db.sql:/docker-entrypoint-initdb.d/01-init-evolution-db.sql:ro
    networks:
      - beauty-salon-net

  # Garante o database "evolution" (para EvolutionAPI) mesmo quando o volume do Postgres já existe
  db-bootstrap:
    image: postgres:16
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      - db
    command: >
      sh -c "
        until pg_isready -h db -U \"$$POSTGRES_USER\" -d postgres; do sleep 1; done;
        exists=\"$$(psql -h db -U \"$$POSTGRES_USER\" -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='evolution'\")\";
        if [ \"$$exists\" != \"1\" ]; then
          echo 'Creating database evolution...';
          createdb -h db -U \"$$POSTGRES_USER\" evolution;
        else
          echo 'Database evolution already exists.';
        fi
      "
    networks:
      - beauty-salon-net

  # Redis para EvolutionAPI
  redis:
    image: redis:7-alpine
    container_name: redis_evolution
    restart: always
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - beauty-salon-net

  # API do sistema principal
  api:
    build: ./api
    environment:
      PORT: 5000
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-beauty_salon}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      INIT_DB: ${INIT_DB:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      NOME_SALAO: ${NOME_SALAO:-Fada Madrinha}
      CORS_ORIGIN: "${FRONTEND_PUBLIC_ORIGIN:-http://localhost:${FRONTEND_PORT_HOST:-13000}}"
      FRONTEND_URL: "${FRONTEND_PUBLIC_ORIGIN:-http://localhost:${FRONTEND_PORT_HOST:-13000}}"
    ports:
      - "${API_PORT_HOST:-15000}:5000"
    depends_on:
      - db
    networks:
      - beauty-salon-net

  # Banco dedicado para testes (isola dados dos testes)
  db-test:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beauty_salon}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_test_data:/var/lib/postgresql/data
    networks:
      - beauty-salon-net

  # Frontend do sistema
  frontend:
    build: ./frontend
    environment:
      REACT_APP_API_URL: "${API_PUBLIC_ORIGIN:-http://localhost:${API_PORT_HOST:-15000}}"
      REACT_APP_EVOLUTION_API_URL: "${EVOLUTION_PUBLIC_ORIGIN:-http://localhost:${EVOLUTION_PORT_HOST:-18080}}"
      REACT_APP_EVOLUTION_API_KEY: ${REACT_APP_EVOLUTION_API_KEY}
    ports:
      - "${FRONTEND_PORT_HOST:-13000}:3000"
    depends_on:
      - api
    networks:
      - beauty-salon-net

  # Testes de API (rodam automaticamente no up)
  api-tests:
    build: ./api
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_HOST: db-test
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-beauty_salon}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      INIT_DB: "true"
      CORS_ORIGIN: "${FRONTEND_PUBLIC_ORIGIN:-http://localhost:${FRONTEND_PORT_HOST:-13000}}"
      PORT: 5000
      TEST_API_URL: http://localhost:5000
    depends_on:
      - db-test
    command: sh -c "npm run init-db && node src/server.js & sleep 6 && npm run test:ci"
    networks:
      - beauty-salon-net

  # Testes do Frontend (executados no up)
  frontend-tests:
    build: ./frontend
    environment:
      CI: "true"
      REACT_APP_API_URL: http://api:5000
      REACT_APP_EVOLUTION_API_KEY: ${REACT_APP_EVOLUTION_API_KEY}
    command: sh -c "export NODE_OPTIONS=--experimental-vm-modules; npm test --watchAll=false --passWithNoTests"
    depends_on:
      - api
    networks:
      - beauty-salon-net

  # EvolutionAPI - WhatsApp Business Integration
  evolution-api:
    image: evoapicloud/evolution-api:homolog
    container_name: evolution_api_beauty_salon
    restart: always
    ports:
      - "${EVOLUTION_PORT_HOST:-18080}:8080"
    env_file:
      - ./.env
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_data:/app/data
    depends_on:
      - redis
    networks:
      - beauty-salon-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db_data:
  db_test_data:
  redis_data:
  evolution_instances:
  evolution_data:

networks:
  beauty-salon-net:
    name: beauty-salon-net
    driver: bridge